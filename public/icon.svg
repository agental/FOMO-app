<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#grad1)" rx="80"/>

  <!-- Globe icon -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="white" stroke-width="12"/>
  <ellipse cx="256" cy="256" rx="70" ry="140" fill="none" stroke="white" stroke-width="12"/>
  <line x1="116" y1="256" x2="396" y2="256" stroke="white" stroke-width="12"/>
  <line x1="256" y1="116" x2="256" y2="396" stroke="white" stroke-width="12"/>

  <!-- Sparkle effect -->
  <circle cx="150" cy="150" r="8" fill="white" opacity="0.8"/>
  <circle cx="380" cy="160" r="10" fill="white" opacity="0.9"/>
  <circle cx="360" cy="380" r="6" fill="white" opacity="0.7"/>
  <circle cx="140" cy="350" r="9" fill="white" opacity="0.85"/>
</svg>
